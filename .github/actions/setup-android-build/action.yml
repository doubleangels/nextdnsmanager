name: Setup Android build
description: JDK 21, Android SDK licenses, API 37.0 platform, and Gradle wrapper permissions.

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v5.3.0
      with:
        java-version: "21"
        distribution: temurin
        cache: gradle

    - name: Prepare Android SDK
      shell: bash
      run: |
        set -eu
        SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
        SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
        echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"

        # yes exits with SIGPIPE once sdkmanager stops reading; that is expected.
        yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true

        # Google publishes API 37 as android-37.0, not android-37.
        if [ ! -d "$SDK_ROOT/platforms/android-37.0" ]; then
          "$SDKMANAGER" "platforms;android-37.0"
        fi

        # Some tooling still resolves platforms/android-37.
        if [ ! -e "$SDK_ROOT/platforms/android-37" ]; then
          ln -sf android-37.0 "$SDK_ROOT/platforms/android-37"
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      shell: bash
