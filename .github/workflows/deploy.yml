name: Release Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-release
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup Android build
        uses: ./.github/actions/setup-android-build

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run Android Lint
        run: ./gradlew lintGmsRelease lintFossRelease --no-daemon

      - name: Build release APKs and bundle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew assembleGmsRelease assembleFossRelease bundleGmsRelease --no-daemon --parallel --build-cache

      - name: Sign GMS APK for GitHub release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/gms/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "37.0.0"

      - name: Rename GMS APK file
        run: mv app/build/outputs/apk/gms/release/app-gms-release-unsigned-signed.apk app/build/outputs/apk/gms/release/app-release.apk

      - name: Sign FOSS APK for GitHub release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/foss/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "37.0.0"

      - name: Rename FOSS APK file
        run: mv app/build/outputs/apk/foss/release/app-foss-release-unsigned-signed.apk app/build/outputs/apk/foss/release/app-release-foss.apk

      - name: Sign bundle for Google Play release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/gmsRelease
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename Google Play bundle file
        run: mv app/build/outputs/bundle/gmsRelease/app-gms-release.aab app/build/outputs/bundle/gmsRelease/app-release.aab

      - name: Upload GMS APK to artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: github-release-apk
          path: app/build/outputs/apk/gms/release/app-release.apk

      - name: Upload FOSS APK to artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: github-foss-release-apk
          path: app/build/outputs/apk/foss/release/app-release-foss.apk

      - name: Upload bundle to artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: google-play-bundle
          path: app/build/outputs/bundle/gmsRelease/app-release.aab

  publish:
    needs: ["build"]
    # Requires a "production" environment in repo Settings → Environments with required reviewers.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment: production
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Download GMS APK from artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: github-release-apk
          path: .

      - name: Download FOSS APK from artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: github-foss-release-apk
          path: .

      - name: Download bundle from artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: google-play-bundle
          path: .

      - name: Read APK info to get version code
        id: android_version
        uses: hkusu/apk-info-action@v1
        with:
          apk-path: app-release.apk

      # release-drafter only lists merged PRs (GitHub API). Plain `git merge`
      # commits are not linked to PRs, so add them from git for the same range.
      - name: Summarize git merge commits since last tag
        id: git_merges
        shell: bash
        run: |
          set -euo pipefail
          delim="git_merges_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_EOF"
          {
            echo "footer<<${delim}"
            prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [[ -n "${prev}" ]]; then
              extra=$(git log "${prev}..HEAD" --merges --pretty=format:'- %s (%h)' \
                | grep -vE '^- Merge pull request #[0-9]+' || true)
              if [[ -n "${extra}" ]]; then
                echo ""
                echo "### Git merges"
                echo "${extra}"
              fi
            fi
            echo "${delim}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release using release-drafter
        id: create_release
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: v${{ steps.android_version.outputs.version-name }}
          name: v${{ steps.android_version.outputs.version-name }}
          footer: ${{ steps.git_merges.outputs.footer }}

      - name: Upload GMS APK to GitHub release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive
          overwrite: true

      - name: Upload FOSS APK to GitHub release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app-release-foss.apk
          asset_name: app-release-foss.apk
          asset_content_type: application/vnd.android.package-archive
          overwrite: true

      - name: Publish GitHub release
        uses: eregon/publish-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release_id: ${{ steps.create_release.outputs.id }}

      - name: Create service_account.json for Google Play release
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Publish bundle to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: service_account.json
          packageName: com.doubleangels.nextdnsmanagement
          releaseFiles: app-release.aab
          tracks: production
          whatsNewDirectory: whatsnew

      - name: Set up Ruby for Fastlane
        uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Lock Ruby gems for reproducible Fastlane
        run: bundle lock

      - name: Install Ruby gems
        run: bundle install --deployment

      - name: Push Fastlane metadata to Play Store
        run: bundle exec fastlane supply --skip_upload_apk true --skip_upload_aab true --skip_upload_changelogs true --json_key service_account.json --package_name com.doubleangels.nextdnsmanagement --track production

      - name: Read app version for Sentry release
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "release=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Finalize Sentry release
        uses: getsentry/action-release@v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: doubleangels
          SENTRY_PROJECT: nextdns-manager
        with:
          environment: production
          release: ${{ steps.version.outputs.release }}

  delete-workflow-runs:
    permissions:
      actions: write
    needs: ["build", "publish"]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 5
